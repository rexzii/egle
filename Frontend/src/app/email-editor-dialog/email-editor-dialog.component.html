<h2 mat-dialog-title style="color: #264796;text-align: center;">Email</h2>
<mat-dialog-content>
  <textarea [(ngModel)]="emailContent"></textarea>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Cancel</button>&nbsp;&nbsp;&nbsp;
  <button mat-button (click)="onSendEmail()">Send Email</button>
</mat-dialog-actions>
