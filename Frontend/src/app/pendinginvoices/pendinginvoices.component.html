<div class="scrollable-modal-content">
  <div class="modal-header">
    <h2>Pending Invoices</h2>
    <button mat-icon-button (click)="closeDialog()">
      <mat-icon>close</mat-icon>
    </button>
  </div> 
  <table class="styled-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Company Name</th>
        <th>Products</th>
        <th>Stage</th>
        <th>Next Follow-up Date</th>
        <th>Contact No</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngIf="leadData && leadData.length > 0">
        <tr *ngFor="let lead of leadData">
          <ng-container *ngIf="isInvoicePending(lead.stage)">
            <td>{{ lead.personname }}</td>
            <td>{{ lead.companyname }}</td>
            <td>{{ lead.products }}</td>
            <td>{{ lead.stage }}</td>
            <td>{{ lead.nextfollow_up_by | date: 'dd-MM-yyyy' }}</td>
            <td>{{ lead.contactno }}</td>
          </ng-container>
        </tr>
      </ng-container>
      <tr *ngIf="hasNoPendingInvoices()">
        <td colspan="8" style="text-align: center;"><b>No Pending Invoice</b></td>
      </tr>
    </tbody>
  </table>
</div><br>
