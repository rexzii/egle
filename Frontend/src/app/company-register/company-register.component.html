<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title> Responsive Registration Form | CodingLab </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background-image: url('../assets/loginback.jpg');">
  <div class="container">
    <div class="title">Company Registration</div>
    <div class="content">
      <form [formGroup]="companyForm" class="form" (ngSubmit)="onSubmit()">
        <div class="user-details">
          <div class="input-box">
            <label for="company_name">Company Name</label>
            <input type="text" formControlName="company_name" required>
          </div>
          <div class="input-box">
            <label for="company_email">Company Email</label>
            <input type="email" formControlName="company_email" required>
          </div>
          <div class="input-box">
            <label for="company_mobile_no">Mobile No</label>
            <input type="tel" formControlName="company_mobile_no" maxlength="10" required>
          </div>
          <div class="input-box">
            <label for="company_address">Company Address</label>
            <input type="text" formControlName="company_address" required>
          </div>
          <div class="input-box">
            <label for="payment">payment</label>
            <input type="number" formControlName="payment" required>
          </div>
          <div class="input-box">
            <label for="total_user">Total User</label>
            <input type="number" formControlName="total_user" required>
          </div>
          <div class="input-box">
            <label for="contact_person">Contact Person</label>
            <input type="text" formControlName="contact_person" required>
          </div>
          <div class="input-box">
            <label class="whatsapp_count">Whatsapp Count</label>
            <input type="number" formControlName="whatsapp_count" required>
          </div>
          <div class="input-box">
            <label class="profile">Profile</label>
            <input type="text" formControlName="profile" required>
          </div>
          <div>
            <label for="company_logo">Company Logo:</label>&nbsp;&nbsp;
            <input type="file" accept="image/*" name="company_logo" id="company_logo" (change)="fileChangeHandler($event)">
          </div>          
        </div>
        <div class="button">
          <input type="submit" value="Register">
        </div>
      </form>
    </div>
  </div>
</body>
</html>
