<h2 mat-dialog-title>Client Already Exists</h2>
<mat-dialog-content>
  This client already exists. Do you want to continue with existing details?
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button class="btn" mat-button [mat-dialog-close]="'no'">No</button>
  <button class="btn" mat-button [mat-dialog-close]="'yes'">Yes</button>
</mat-dialog-actions>
